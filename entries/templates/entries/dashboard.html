{% extends 'base.html' %}
{% block content %}

    <div class="d-flex flex-column gap-3">

        <!-- cartes -->
        
        {% for entry in entries %} 
            <div class="card border-0 shadow-sm">

            <div class="card-body">

                <div class="d-flex justify-content-between">

                <div class="d-flex gap-3">

                    <img
                    src="{{ entry.image.url }}"
                    class="activity-img rounded"
                    alt=""
                    >

                    <div>

                    <div class="d-flex align-items-center gap-2 flex-wrap mb-2">

                        <h6 class="fw-bold mb-0">{{ entry.titre }}</h6>

                        <span class="badge text-bg-primary"> {{entry.categorie.nom}} </span>

                    </div>

                    <small class="text-secondary d-block mb-2">
                        <i class="bi bi-person"></i> {{entry.auteur}} <i class="bi bi-calendar"></i> {{entry.date_creation}}
                    </small>

                    <p class="text-secondary small mb-0"> {{entry.contenu | truncatewords:15}} </p>

                    </div>

                </div>

                <div class="d-flex gap-2">

                    <a href="{% url 'detail' entry.pk %}" class="btn btn-light border rounded action-btn">
                        <i class="bi bi-eye text-primary"></i>
                    </a>

                    <button class="btn btn-light border rounded action-btn">
                    <i class="bi bi-pencil text-warning"></i>
                    </button>

                    <button class="btn btn-light border rounded action-btn">
                    <i class="bi bi-trash text-danger"></i>
                    </button>

                </div>

                </div>

            </div>

            </div>
        {% endfor %}
      </div>

{% endblock %}>
