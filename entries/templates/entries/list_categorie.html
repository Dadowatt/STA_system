{% extends 'base.html' %}
{% block content %}
<h2 class="fw-bold mb-3">Liste des catégories</h2>
<table class="table table-hover shadow">
  <thead>
    <tr>
      <th scope="col">ID</th>
      <th scope="col">Nom</th>
    </tr>
  </thead>

   <tbody>
       {% for categorie in categories %}
    <tr>
      <td>{{ categorie.id }}</td>
      <td>{{ categorie.nom }}</td>
    </tr>
    {% endfor %}
    </tbody>
</table>
{% endblock  %}
